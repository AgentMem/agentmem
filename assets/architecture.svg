<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" role="img" aria-label="How AgentMem sits alongside the action agent">
  <style>
    .t  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .title { font-weight: 700; fill: #17171A; }
    .muted { fill: #56565F; }
    .accent { fill: #3B5BDB; }
  </style>

  <rect x="1" y="1" width="958" height="398" rx="20" fill="#FFFFFF" stroke="#E7E7EC" stroke-width="1.5"/>

  <!-- Action agent -->
  <rect x="40" y="122" width="250" height="156" rx="16" fill="#FFFFFF" stroke="#17171A" stroke-width="2"/>
  <text class="t title" x="165" y="171" font-size="21" text-anchor="middle">Action Agent</text>
  <text class="t muted" x="165" y="201" font-size="13" text-anchor="middle">Claude Code · Agent SDK</text>
  <text class="t muted" x="165" y="221" font-size="13" text-anchor="middle">LangGraph · your own loop</text>
  <rect x="92" y="240" width="146" height="26" rx="13" fill="#F2F4FF" stroke="#3B5BDB" stroke-width="1"/>
  <text class="t accent" x="165" y="257" font-size="11" text-anchor="middle">prompt + tools untouched</text>

  <!-- Forward arrow -->
  <text class="t muted" x="340" y="140" font-size="12.5" text-anchor="middle">trajectory events</text>
  <path d="M294 152 H378" stroke="#17171A" stroke-width="2" fill="none"/>
  <path d="M378 146 L390 152 L378 158 Z" fill="#17171A"/>

  <!-- AgentMem panel -->
  <rect x="392" y="64" width="528" height="248" rx="18" fill="#F6F7FF" stroke="#3B5BDB" stroke-width="1.8"/>
  <text class="t title" x="416" y="101" font-size="22">AgentMem</text>
  <text class="t muted" x="416" y="125" font-size="12.5">a second agent that watches the run, keeps a structured memory bank,</text>
  <text class="t muted" x="416" y="143" font-size="12.5">and decides when a reminder is actually worth it</text>

  <!-- Phase 1 -->
  <rect x="416" y="158" width="480" height="62" rx="12" fill="#FFFFFF" stroke="#E7E7EC" stroke-width="1.4"/>
  <circle cx="444" cy="189" r="14" fill="#3B5BDB"/>
  <text class="t" x="444" y="194" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text class="t title" x="470" y="184" font-size="15">Manage the bank</text>
  <text class="t muted" x="470" y="205" font-size="12">save Knowledge · Procedural · Status through tool calls</text>

  <!-- Phase 2 -->
  <rect x="416" y="232" width="480" height="62" rx="12" fill="#FFFFFF" stroke="#E7E7EC" stroke-width="1.4"/>
  <circle cx="444" cy="263" r="14" fill="#3B5BDB"/>
  <text class="t" x="444" y="268" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text class="t title" x="470" y="258" font-size="15">Decide</text>
  <text class="t muted" x="470" y="279" font-size="12">inject one grounded reminder, or stay silent (the common case)</text>

  <!-- Return arrow -->
  <path d="M428 316 C 340 372, 250 372, 166 286" fill="none" stroke="#3B5BDB" stroke-width="2"/>
  <path d="M160 296 L166 282 L172 296 Z" fill="#3B5BDB"/>
  <text class="t accent" x="297" y="390" font-size="12" font-weight="600" text-anchor="middle">transient reminder → applies to the agent's next turn</text>
</svg>
