[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentmem"
dynamic = ["version"]
description = "A proactive memory layer for long-horizon coding agents, it knows when to remind."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["../../LICENSE", "../../NOTICE"]
authors = [{ name = "The AgentMem Authors" }]
keywords = ["llm", "agents", "memory", "claude-code", "long-horizon", "coding-agents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

# Kept intentionally small so `pip install agentmem` is quick and boring:
#   - pydantic       : the schemas every module shares
#   - pydantic-settings : env-var config (AGENTMEM_*)
#   - anthropic      : the default (and only, for now) LLM provider
# The SQLite store uses the stdlib `sqlite3`, so it adds no dependency.
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "anthropic>=0.40",
]

[project.optional-dependencies]
# Warm mode: the optional long-running daemon (FastAPI + uvicorn). Most setups use the
# default daemon-less command hooks and don't need this.
daemon = ["agentmem-daemon"]
# The Claude Agent SDK adapter needs the SDK's HookMatcher.
agent-sdk = ["claude-agent-sdk>=0.2"]
# MCP server: expose read-only memory to any MCP host (Cursor, Copilot, Codex, Gemini
# CLI). The official SDK bundles FastMCP; v2 renames it, so stay below it.
mcp = ["mcp>=1.28,<2"]
# Aider adapter: subclass its coder for a transient reminder, drive its run loop.
aider = ["aider-chat>=0.86,<0.87"]
# OpenAI Agents SDK adapter: observe via RunHooks, inject via call_model_input_filter.
openai-agents = ["openai-agents>=0.18,<0.19"]
# Route the memory agent through any backend litellm supports (Gemini, OpenAI, vLLM,
# Ollama) by setting model="litellm/<backend>", e.g. litellm/gemini/gemini-2.5-flash.
litellm = ["litellm>=1.40"]

[tool.uv]
# aider-chat pins openai==2.20 while openai-agents needs openai>=2.45, so a single
# environment can't hold both. They're independent adapters, install whichever you use;
# this tells uv to resolve them in separate forks instead of failing the lockfile.
conflicts = [[{ extra = "aider" }, { extra = "openai-agents" }]]

[project.urls]
Homepage = "https://agentmem.xyz"
Repository = "https://github.com/agentmem/agentmem"
Documentation = "https://agentmem.xyz/docs"
Changelog = "https://github.com/agentmem/agentmem/blob/main/CHANGELOG.md"

[project.scripts]
agentmem = "agentmem.cli:main"
agentmem-mcp = "agentmem.mcp:main"

[tool.hatch.version]
path = "src/agentmem/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/agentmem"]
